<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherUI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #0f172a;
    }

    p {
      color: #475569;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      max-width: 850px;
      margin: auto;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 14px 26px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    a:hover {
      background: #1d4ed8;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #94a3b8;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 12px;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>WeatherUI</h1>

  <p>Oracle APEX weather dashboard with real-time API integration</p>

  <div class="card">

    <img src="images/demo.png" alt="WeatherUI Screenshot">

    <a href="https://g49971ef53c3dd8-aidatabase.adb.uk-london-1.oraclecloudapps.com/ords/r/oracleapexlivelab/gettheweatherapp110/weatherui"
       target="_blank">
      View Live Demo
    </a>

    <div class="tag">Oracle APEX • PL/SQL • REST API</div>

  </div>

  <div class="footer">
    Built as a portfolio project showcasing backend + API integration skills
  </div>

</body>
</html>
